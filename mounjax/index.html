    /* Background div occupies full viewport height */
    .background {
      height: 100vh; /* Full viewport height */

    /* Overlay para melhorar LCP */

      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.45);
      pointer-events: none;
      z-index: 0;
